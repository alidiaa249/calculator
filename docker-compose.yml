version: '3.8'

services:

  # ── Backend API (Node.js + Express) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calculator-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - calculator-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Frontend (Angular) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calculator-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - calculator-network

# ── Network ─────────────────────────────────────────────
networks:
  calculator-network:
    driver: bridge
